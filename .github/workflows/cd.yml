name: CD - Publish API Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Lint with ruff
        run: uv run ruff check src tests scripts

      - name: Configure DVC credentials
        env:
          DVC_GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.DVC_GDRIVE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$DVC_GDRIVE_SERVICE_ACCOUNT_JSON" ]; then
            echo "Missing DVC_GDRIVE_SERVICE_ACCOUNT_JSON. CD requires service-account credentials before image publish."
            exit 1
          fi
          SA_PATH="$RUNNER_TEMP/gdrive-service-account.json"
          printf '%s' "$DVC_GDRIVE_SERVICE_ACCOUNT_JSON" > "$SA_PATH"
          uv run dvc remote modify --local gdrive_remote gdrive_use_service_account true
          uv run dvc remote modify --local gdrive_remote gdrive_service_account_json_file_path "$SA_PATH"
          uv run dvc pull

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/movie-recommender-api
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
