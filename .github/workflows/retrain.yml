name: Retraining Pipeline

on:
  workflow_dispatch:
    inputs:
      strategy:
        description: "Retraining strategy"
        required: false
        default: "schedule"
        type: choice
        options:
          - schedule
          - trigger
      force:
        description: "Force retraining when trigger is not met"
        required: false
        default: false
        type: boolean
      auto_merge:
        description: "Enable auto-merge for the promotion PR"
        required: false
        default: true
        type: boolean
  schedule:
    - cron: "0 3 * * 1"

jobs:
  retrain:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Configure DVC credentials
        env:
          DVC_GDRIVE_CLIENT_ID: ${{ secrets.DVC_GDRIVE_CLIENT_ID }}
          DVC_GDRIVE_CLIENT_SECRET: ${{ secrets.DVC_GDRIVE_CLIENT_SECRET }}
        run: |
          if [ -z "$DVC_GDRIVE_CLIENT_ID" ] || [ -z "$DVC_GDRIVE_CLIENT_SECRET" ]; then
            echo "Missing DVC secrets. Retraining workflow requires artifact access."
            exit 1
          fi
          uv run dvc remote modify --local gdrive_remote gdrive_client_id "$DVC_GDRIVE_CLIENT_ID"
          uv run dvc remote modify --local gdrive_remote gdrive_client_secret "$DVC_GDRIVE_CLIENT_SECRET"
          uv run dvc pull

      - name: Run retraining pipeline
        run: |
          STRATEGY="${{ github.event.inputs.strategy || 'schedule' }}"
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force || 'false' }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          uv run python src/pipeline/retrain_pipeline.py --strategy "$STRATEGY" $FORCE_FLAG

      - name: Collect retraining decision
        id: decision
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path("reports/retraining/retrain_report.json").read_text(encoding="utf-8"))
          with open(Path.cwd() / "decision_outputs.txt", "w", encoding="utf-8") as f:
              f.write(f"decision={payload.get('decision', '')}\n")
              f.write(f"status={payload.get('status', '')}\n")
          PY
          cat decision_outputs.txt >> "$GITHUB_OUTPUT"

      - name: Commit promoted artifacts to DVC cache
        if: steps.decision.outputs.decision == 'promote'
        run: |
          uv run dvc commit models/personalized/bpr_model.pkl models/personalized/bpr_model.json
          uv run dvc push

      - name: Create release pull request
        id: cpr
        if: steps.decision.outputs.decision == 'promote' || steps.decision.outputs.decision == 'keep_current'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(retrain): record retraining decision"
          branch: "codex/retrain-promotion-${{ github.run_id }}"
          title: "chore(retrain): record retraining decision"
          body: |
            Automated release PR generated by the retraining workflow.

            - strategy: `${{ github.event.inputs.strategy || 'schedule' }}`
            - status: `${{ steps.decision.outputs.status }}`
            - decision: `${{ steps.decision.outputs.decision }}`

            Included changes:
            - retraining reports
            - release manifest
            - active model registry update if promotion occurred
            - DVC metadata/artifact updates if promotion occurred
          add-paths: |
            models/registry.json
            reports/retraining/retrain_report.md
            reports/retraining/retrain_report.json
            reports/retraining/release_manifest.json
            dvc.lock

      - name: Enable PR auto-merge
        if: (steps.decision.outputs.decision == 'promote' || steps.decision.outputs.decision == 'keep_current') && github.event.inputs.auto_merge != 'false' && steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-number }}"

      - name: Upload retraining reports
        uses: actions/upload-artifact@v4
        with:
          name: retraining-reports
          path: |
            reports/retraining/retrain_report.md
            reports/retraining/retrain_report.json
            reports/retraining/release_manifest.json
